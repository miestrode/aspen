data_dir = ".crucible"

[server]
web_port = 8877
web_host = "127.0.0.1"

[testing]
concurrency = 4
max_games = 10000
hash_mb = 16
engine_threads = 1
poll_interval_seconds = 60

[testing.time_control]
base_ms = 10000
increment_ms = 100

[testing.sprt]
elo0 = 0.0
elo1 = 5.0
alpha = 0.05
beta = 0.05
min_games = 16

[training]
output_dir = ".crucible/training"
selfplay_games = 100
collect_from_tests = true
regression_min_depth = 10
selfplay_depth = 10
idle_selfplay = false
idle_batch_games = 1

