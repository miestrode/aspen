[[engines]]
name = "aspen"
repo = "https://github.com/miestrode/aspen"
branches = ["main"]
experimental_branches = ["exp/*"]
build_cmd = "cargo build --release"
binary_path = "target/release/aspen"
start_from = "v0.1"
